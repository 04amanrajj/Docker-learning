version: '3.8'

services:
  # 1. MongoDB Database Node
  mongodb:
    image: mongo:6.0
    container_name: satyanaam-mongodb
    restart: always
    volumes:
      - mongodb-data:/data/db
    networks:
      - satyanaam-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # 2. Redis Cache Node
  redis:
    image: redis:7.2-alpine
    container_name: satyanaam-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - satyanaam-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # 3. Node.js Express Backend Node
  satyanaam-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: satyanaam-backend
    restart: always
    environment:
      - PORT=4500
      - MONGO_URI=mongodb://mongodb:27017/restaurent
      - REDIS_URI=redis://redis:6379
      - JWT_EXPIRES_IN=6000
      - SECRET_KEY=myfoooooooood
      - ADMIN_SECRET_KEY=c59af9cc5322d2f1f1ad00e3c17332d6deb4000842917d2376a0eecc4a92e74f
    networks:
      - satyanaam-net
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4500/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 4. Nginx Frontend Node
  satyanaam-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: satyanaam-frontend
    restart: always
    ports:
      - "8080:80"
    networks:
      - satyanaam-net
    depends_on:
      satyanaam-backend:
        condition: service_healthy

networks:
  satyanaam-net:
    name: satyanaam-net
    driver: bridge

volumes:
  mongodb-data:
    name: satyanaam-mongodb-data
  redis-data:
    name: satyanaam-redis-data

services:
  # ---------------------------------------------------
  # 1. API APP: Hardened Telemetry Node Backend
  # ---------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: proddock-app
    entrypoint: ["node", "app.js"]
    # Strict cgroup CPU and RAM resources allocation capping
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/proddock
      - REDIS_URL=redis://cache:6379
    # Keep it unexposed publicly
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  # ---------------------------------------------------
  # 2. DATABASE: PostgreSQL Persistent Tier
  # ---------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: proddock-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=proddock
    volumes:
      - proddock-postgres-data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    # Production health check testing PG socket availability before app boots
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d proddock"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    restart: unless-stopped

  # ---------------------------------------------------
  # 3. CACHE: Redis Performance Caching Tier
  # ---------------------------------------------------
  cache:
    image: redis:7-alpine
    container_name: proddock-cache
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    expose:
      - "6379"
    restart: unless-stopped

  # ---------------------------------------------------
  # 4. FRONTEND GATEWAY: Nginx Reverse Proxy Web UI
  # ---------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: proddock-frontend
    ports:
      - "8080:80"
    depends_on:
      - app
    restart: unless-stopped

# Named persistent volumes for storage data security
volumes:
  proddock-postgres-data:

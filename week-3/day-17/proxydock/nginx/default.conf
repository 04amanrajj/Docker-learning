server {
    listen 80;
    server_name localhost;

    # 1. SERVE STATIC FRONTEND CLIENT FILES
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # 2. REVERSE PROXY TELEMETRY API REQUESTS
    location /api/ {
        # Forward requests transparently to internal Express container
        proxy_pass http://backend:5000/api/;

        # Pass crucial client metadata headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Hardened proxy socket timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Custom clean error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

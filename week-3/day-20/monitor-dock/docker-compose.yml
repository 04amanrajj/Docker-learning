services:
  # ---------------------------------------------------
  # 1. API SERVER: Telemetry exporter backend
  # ---------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: monitordock-app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/monitordock
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ---------------------------------------------------
  # 2. DATABASE: PostgreSQL relational engine
  # ---------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: monitordock-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=monitordock
    volumes:
      - db-monitor-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monitordock"]
      interval: 3s
      timeout: 3s
      retries: 5
    expose:
      - "5432"
    restart: always

  # ---------------------------------------------------
  # 3. CADVISOR: Container telemetry collector
  # ---------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: monitordock-cadvisor
    # cAdvisor requires host read-only mounts to inspect active container subnets and cgroups
    volumes:
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /dev/disk/:/dev/disk:ro
    expose:
      - "8080"
    restart: always

  # ---------------------------------------------------
  # 4. PROMETHEUS: Scraper and TSDB engine
  # ---------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: monitordock-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-storage:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    expose:
      - "9090"
    depends_on:
      - app
      - cadvisor
    restart: always

  # ---------------------------------------------------
  # 5. GRAFANA: Observability client dashboard gateway
  # ---------------------------------------------------
  grafana:
    image: grafana/grafana:10.0.0
    container_name: monitordock-grafana
    ports:
      - "3000:3000"
    # Auto-provisioning data sources and pre-configured dashboards on launch
    volumes:
      - ./grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./grafana/provisioning/dashboards/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
      - ./grafana/provisioning/dashboards/main_dashboard.json:/etc/grafana/provisioning/dashboards/main_dashboard.json:ro
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    restart: always

volumes:
  db-monitor-data:
  prometheus-storage:
  grafana-storage:

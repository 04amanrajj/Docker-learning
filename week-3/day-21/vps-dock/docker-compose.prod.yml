services:
  # ---------------------------------------------------
  # 1. TLS REVERSE PROXY GATEWAY: Nginx public endpoint
  # ---------------------------------------------------
  nginx-gateway:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: vpsdock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount SSL certificate volume paths shared with Certbot
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - app
      - grafana
    restart: always

  # ---------------------------------------------------
  # 2. AUTOMATED SSL CERTIFICATE ENGINE: Certbot companion
  # ---------------------------------------------------
  certbot:
    image: certbot/certbot:v2.6.0
    container_name: vpsdock-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    # Periodically attempts SSL certificate renewals every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    restart: always

  # ---------------------------------------------------
  # 3. TELEMETRY BACKEND: Instrumented Node Express API
  # ---------------------------------------------------
  app:
    build:
      context: ../../day-20/monitor-dock/app
      dockerfile: Dockerfile
    container_name: vpsdock-app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/vpsdock
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  # ---------------------------------------------------
  # 4. DATABASE SERVICE: Relational engine
  # ---------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: vpsdock-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vpsdock
    volumes:
      - vps-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpsdock"]
      interval: 3s
      timeout: 3s
      retries: 5
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    restart: always

  # ---------------------------------------------------
  # 5. SCRAPER & TSDB: Prometheus internal registry
  # ---------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: vpsdock-prometheus
    volumes:
      - ../../day-20/monitor-dock/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - vps-prometheus-storage:/prometheus
    expose:
      - "9090"
    restart: always

  # ---------------------------------------------------
  # 6. OBSERVABILITY PANEL: Grafana telemetry center
  # ---------------------------------------------------
  grafana:
    image: grafana/grafana:10.0.0
    container_name: vpsdock-grafana
    volumes:
      - ../../day-20/monitor-dock/grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ../../day-20/monitor-dock/grafana/provisioning/dashboards/dashboard.yaml:/etc/grafana/provisioning/dashboards/dashboard.yaml:ro
      - ../../day-20/monitor-dock/grafana/provisioning/dashboards/main_dashboard.json:/etc/grafana/provisioning/dashboards/main_dashboard.json:ro
      - vps-grafana-storage:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus
    restart: always

volumes:
  vps-db-data:
  vps-prometheus-storage:
  vps-grafana-storage:

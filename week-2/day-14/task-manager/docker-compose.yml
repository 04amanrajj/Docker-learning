services:
  # ---------------------------------------------------
  # 1. DATABASE NODE: Persistent PostgreSQL relational database
  # ---------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: taskmanager-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgressecret
      POSTGRES_DB: postgres
    volumes:
      - taskmanager-db-data:/var/lib/postgresql/data
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # 🩺 DB HEALTHCHECK: Ensures SQL queries can resolve before server initialization
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - taskmanager-net
    restart: always

  # ---------------------------------------------------
  # 2. CACHE NODE: High-speed Redis Memory Cache
  # ---------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: taskmanager-redis
    # Protected network access internally - no host exposure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - taskmanager-net
    restart: always

  # ---------------------------------------------------
  # 3. BACKEND API NODE: Fastify server engine
  # ---------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: taskmanager-db
      DB_USER: postgres
      DB_PASSWORD: postgressecret
      DB_NAME: postgres
      REDIS_HOST: taskmanager-redis
      REDIS_PORT: 6379
    # 🚦 HIGH-PERFORMANCE BOOTSTRAPPING DEPENDENCIES:
    # Requires both PostgreSQL and Redis caches to be fully online and verified!
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - taskmanager-net
    restart: always

  # ---------------------------------------------------
  # 4. FRONTEND static Nginx client visualizer
  # ---------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - taskmanager-net
    restart: always

# ---------------------------------------------------
# NETWORK & VOLUME BOUNDARIES
# ---------------------------------------------------
volumes:
  taskmanager-db-data:
    driver: local

networks:
  taskmanager-net:
    driver: bridge

services:
  # ---------------------------------------------------
  # 1. DATABASE NODE: PostgreSQL Relational Database
  # ---------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: timedock-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgressecret
      POSTGRES_DB: postgres
    volumes:
      # Mount initialization seeding schema scripts
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Named volume for durable timer logs data persistence
      - timedock-db-data:/var/lib/postgresql/data
    networks:
      - timedock-net
    restart: always

  # ---------------------------------------------------
  # 2. BACKEND API NODE: Express time-tracker REST server
  # ---------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timedock-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: timedock-db
      DB_USER: postgres
      DB_PASSWORD: postgressecret
      DB_NAME: postgres
    depends_on:
      - database
    networks:
      - timedock-net
    restart: always

  # ---------------------------------------------------
  # 3. FRONTEND static Nginx client visualizer
  # ---------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: timedock-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - timedock-net
    restart: always

# ---------------------------------------------------
# NETWORK & VOLUME BOUNDARIES
# ---------------------------------------------------
volumes:
  timedock-db-data:
    driver: local

networks:
  timedock-net:
    driver: bridge

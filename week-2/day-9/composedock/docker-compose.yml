version: '3.8'

services:
  # ---------------------------------------------------
  # 1. DATABASE LAYER: Relational Persistent PostgreSQL
  # ---------------------------------------------------
  database:
    image: postgres:16-alpine
    container_name: compose-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgressecret
      POSTGRES_DB: postgres
    volumes:
      # Mount initialization seeding script
      - ./db-init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      # Named volume mount to ensure persistence
      - compose-db-data:/var/lib/postgresql/data
    networks:
      - compose-net
    restart: always

  # ---------------------------------------------------
  # 2. BACKEND LAYER: Express REST API Node App
  # ---------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: compose-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: compose-db
      DB_USER: postgres
      DB_PASSWORD: postgressecret
      DB_NAME: postgres
    depends_on:
      - database
    networks:
      - compose-net
    restart: always

  # ---------------------------------------------------
  # 3. FRONTEND LAYER: Glassmorphic Nginx Client UI
  # ---------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: compose-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - compose-net
    restart: always

# ---------------------------------------------------
# NETWORK & VOLUME BOUNDARIES
# ---------------------------------------------------
volumes:
  compose-db-data:
    driver: local

networks:
  compose-net:
    driver: bridge
